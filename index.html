<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Squire &mdash; Life Skills Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app">
    <header class="app-header landing-header">
      <button id="menu-btn" class="menu-btn" aria-label="Open menu">☰</button>
    </header>

    <main class="landing">
      <h1 class="landing-name">Squire</h1>
      <p class="landing-tagline">Your pocket guide to life skills</p>
      <a href="search.html" class="landing-cta">Search</a>
    </main>
  </div>

  <div id="overlay" class="overlay"></div>
  <nav id="side-menu" class="side-menu">
    <button id="close-menu" class="close-menu" aria-label="Close menu">✕</button>
    <a href="about.html" class="side-menu-link">How Squire Works</a>
    <a href="search.html" class="side-menu-link">Search</a>
  </nav>

  <script>
    const menuBtn = document.getElementById("menu-btn");
    const closeBtn = document.getElementById("close-menu");
    const sideMenu = document.getElementById("side-menu");
    const overlay = document.getElementById("overlay");

    function openMenu() {
      sideMenu.classList.add("open");
      overlay.classList.add("visible");
    }
    function closeMenu() {
      sideMenu.classList.remove("open");
      overlay.classList.remove("visible");
    }

    menuBtn.addEventListener("click", openMenu);
    closeBtn.addEventListener("click", closeMenu);
    overlay.addEventListener("click", closeMenu);
  </script>
</body>
</html>
